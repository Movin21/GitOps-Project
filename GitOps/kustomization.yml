apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: boutique

resources:
  - namespace.yml
  - secrets.yml
  - K8s/database/statefulset.yml
  - K8s/database/service.yml
  - K8s/backend/gateway.yml
  - K8s/backend/service-monitor.yml
  - K8s/backend/auth.yml
  - K8s/backend/product-service.yml
  - K8s/backend/order-service.yml
  - K8s/backend/orders.yml
  - K8s/backend/user-service.yml
  - K8s/frontend/deployment.yml
  - K8s/grafana-dashboard.yml
  # Network policies — applied before workloads
  - K8s/network-policies/default-deny.yml
  - K8s/network-policies/allow-internal.yml
  - K8s/network-policies/allow-ingress-controller.yml
  - K8s/network-policies/allow-dns-egress.yml
  # ALB Ingress
  - K8s/ingress/ingress.yml

configMapGenerator:
  - name: boutique-db-dump
    files:
      - K8s/database/boutique_full.sql

generatorOptions:
  disableNameSuffixHash: true
