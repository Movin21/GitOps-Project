name: Boutique CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Set Build Context Path
        id: ctx
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            echo "path=src/frontend" >> $GITHUB_OUTPUT
          else
            echo "path=src/backend/services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        run: |
          ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}
          docker build \
            -t $ECR_REPO:$IMAGE_TAG \
            -t $ECR_REPO:latest \
            ${{ steps.ctx.outputs.path }}

      - name: Push Docker Image
        if: github.event_name != 'pull_request'
        run: |
          ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

