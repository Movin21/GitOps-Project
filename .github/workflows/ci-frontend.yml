name: CI — frontend

on:
  push:
    branches: [main]
    paths:
      - "src/frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "src/frontend/**"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  SERVICE: frontend
  BUILD_PATH: src/frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        run: |
          ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE
          docker build \
            -t $ECR_REPO:$IMAGE_TAG \
            -t $ECR_REPO:latest \
            $BUILD_PATH

      - name: Push Docker Image
        if: github.event_name != 'pull_request'
        run: |
          ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

  update-manifests:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in k8s manifest
        run: |
          MANIFEST="gitops/k8s/frontend/deployment.yml"
          if [ -f "$MANIFEST" ]; then
            sed -i "s|$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE:.*|$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE:$IMAGE_TAG|g" "$MANIFEST"
          else
            echo "Warning: manifest not found at $MANIFEST — skipping"
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/k8s/frontend/deployment.yml
          git diff --staged --quiet || git commit -m "ci($SERVICE): update image tag to $IMAGE_TAG"
          git push
